<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<title>Enter the World</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* LANGUAGE SWITCH */

.language-switch {

right: 20px;

}

.language-switch a {

}

/* BODY */

body {
    margin: 0;

    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

.door-image {

    margin-top: 60px;

}

.door-image img {

    width: 100%;

    height: auto;

    border-radius: 16px;

    border: 2px solid #d4af37;

    cursor: pointer;

    box-shadow:
        0 0 0 2px #d4af37,

.message {

    margin-top: 25px;

    font-family: 'MedievalSharp', cursive;

    .message {
