<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Entrance</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* LANGUAGE SWITCH */

.language-switch {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 22px;
}

.language-switch a {
    text-decoration: none;
    margin-left: 8px;
}

/* CONTAINER */

.container {
    margin-top: 40px;
}

/* DOOR */

#dvere {
    width: 100%;
    max-width: 350px;
    border-radius: 12px;
    border: 2px solid #d4af37;
    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);
    cursor: pointer;
}

/* TEXT */

label {
    display: block;
    margin-top: 25px;
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 22px;
}

/* PASSWORD WRAPPER */

.password-wrapper {
    position: relative;
    display: inline-block;
}

/* INPUT */

.password-wrapper input {
    margin-top: 15px;
    padding: 10px;
    padding-right: 40px;
    width: 250px;
    max-width: 80%;
    font-size: 16px;
}

/* EYE ICON */

.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    user-select: none;
}

/* BUTTON */

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}

</style>

</head>

<body>

<div class="language-switch">

<a href="#" onclick="setLang('cz')">🇨🇿</a> <a href="#" onclick="setLang('en')">🇬🇧</a>

</div>

<div class="container">

<img id="dvere"
src="dvere_zavrene.png"
alt="Closed door">

<label id="labelText">
Enter password
</label>

<div class="password-wrapper">

<input type="password"
id="heslo"
placeholder="Enter password">

<span class="toggle-password"
onclick="togglePassword()">
👁️ </span>

</div>

<br>

<button onclick="zkontrolujHeslo()">
Enter
</button>

</div>

<script>

var lang =
localStorage.getItem("lang") || "en";

function setLang(l) {

localStorage.setItem("lang", l);

lang = l;

location.reload();

}

/* SHOW / HIDE PASSWORD */

function togglePassword() {

var input =
document.getElementById("heslo");

if (input.type === "password") {
    input.type = "text";
} else {
    input.type = "password";
}

}

function zkontrolujHeslo() {

var heslo =
document.getElementById("heslo").value;

if (heslo === "library") {

document.getElementById("dvere").src =
"dvere_otevrene.png";

document.getElementById("labelText")
.innerText =
"The door is opening. Click on it.";

document.getElementById("dvere").onclick =
function() {

if (lang === "en") {

window.location.href =
"hlavni_en.html";

} else {

window.location.href =
"hlavni.html";

}

};

}

else {

window.location.href =
"retezove_dvere_en.html";

}

}

</script>

</body>
</html>
