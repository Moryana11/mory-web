<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Entrance</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* BODY */

body {

background-color: black;

margin: 0;

text-align: center;

font-family: Arial, sans-serif;

overflow: hidden;

position: relative;

color: white;

}

/* MAGIC DUST */

#magicDust{

position: fixed;

top: 0;

left: 0;

width: 100%;

height: 100%;

pointer-events: none;

z-index: 0;

}

/* LANGUAGE SWITCH */

.language-switch {

position: fixed;

top: 15px;

right: 25px;

z-index: 99999;

display: flex;

gap: 12px;

align-items: center;

}

.language-switch a {

font-family: 'MedievalSharp', cursive;

text-decoration: none;

color: #d4af37;

font-size: 22px;

transition: 0.3s;

}

.language-switch a:hover {

text-shadow:
0 0 10px #d4af37,
0 0 20px rgba(212,175,55,0.8);

}

/* ACTIVE LANGUAGE */

.language-switch a.active-lang {

color: white;

text-shadow:
0 0 10px rgba(255,255,255,0.7);

}

/* CONTENT ABOVE EFFECT */

.container {

position: relative;

z-index: 2;

margin-top: 40px;

}

/* DOOR */

#dvere {

width: 100%;

max-width: 350px;

border-radius: 12px;

border: 2px solid #d4af37;

box-shadow:
0 0 0 2px #d4af37,
0 0 12px rgba(212,175,55,0.6);

cursor: pointer;

transition: 0.35s;

}

#dvere:hover {

transform: scale(1.02);

box-shadow:
0 0 0 2px #d4af37,
0 0 28px rgba(212,175,55,0.9);

}

/* TEXT */

label {

display: block;

margin-top: 25px;

font-family: 'MedievalSharp', cursive;

color: #d4af37;

font-size: 24px;

text-shadow:
0 0 10px rgba(212,175,55,0.4);

}

/* INPUT */

.password-wrapper {

position: relative;

display: inline-block;

}

.password-wrapper input {

margin-top: 18px;

padding: 12px;

padding-right: 45px;

width: 260px;

max-width: 80%;

font-size: 16px;

border-radius: 8px;

border: 2px solid #d4af37;

background-color: rgba(20,20,20,0.95);

color: white;

outline: none;

box-shadow:
0 0 12px rgba(212,175,55,0.15);

}

.password-wrapper input::placeholder {

color: rgba(255,255,255,0.6);

}

/* EYE ICON */

.toggle-password {

position: absolute;

right: 12px;

top: 50%;

transform: translateY(-50%);

cursor: pointer;

font-size: 18px;

user-select: none;

}

/* BUTTON */

button {

margin-top: 18px;

padding: 12px 24px;

font-size: 17px;

font-family: 'MedievalSharp', cursive;

color: black;

background-color: #d4af37;

border: none;

border-radius: 10px;

cursor: pointer;

transition: 0.3s;

box-shadow:
0 0 15px rgba(212,175,55,0.45);

}

button:hover {

transform: scale(1.05);

box-shadow:
0 0 25px rgba(212,175,55,0.8);

}

/* MOBILE */

@media (max-width: 768px) {

.container {

margin-top: 25px;

}

label {

font-size: 22px;

}

#dvere {

max-width: 85%;

}

.language-switch {

right: 15px;

top: 12px;

}

.language-switch a {

font-size: 20px;

}

}

</style>

</head>

<body>

<!-- MAGIC DUST -->

<canvas id="magicDust"></canvas>

<!-- LANGUAGE SWITCH -->

<div class="language-switch">

<a href="index.html">
CZ
</a>

<a href="index_en.html"
class="active-lang">
EN
</a>

</div>

<!-- CONTAINER -->

<div class="container">

<img id="dvere"
src="dvere_zavrene.png"
alt="Closed Door">

<label id="labelText">
Enter password
</label>

<div class="password-wrapper">

<input type="password"
id="heslo"
placeholder="Enter password">

<span class="toggle-password"
onclick="togglePassword()">
👁️
</span>

</div>

<br>

<button onclick="zkontrolujHeslo()">
Enter
</button>

</div>

<script>

/* AUTOMATIC LOGIN */

if(localStorage.getItem("libraryAccess") === "granted"){

window.location.href =
"hlavni_en.html";

}

/* SHOW / HIDE PASSWORD */

function togglePassword() {

var input =
document.getElementById("heslo");

if (input.type === "password") {

input.type = "text";

} else {

input.type = "password";

}

}

/* PASSWORD CHECK */

function zkontrolujHeslo() {

var heslo =
document.getElementById("heslo").value;

var spravneHeslo =
"library";

var zadane =
heslo.trim().toLowerCase();

if (zadane === spravneHeslo) {

/* SAVE LOGIN */

localStorage.setItem(
"libraryAccess",
"granted"
);

document.getElementById("dvere").src =
"dvere_otevrene.png";

document.getElementById("labelText")
.innerText =
"The door is opening. Click on it.";

document.getElementById("dvere").onclick =
function() {

window.location.href =
"hlavni_en.html";

};

}

else {

window.location.href =
"retezove_dvere_en.html";

}

}

/* ENTER */

document
.getElementById("heslo")
.addEventListener("keypress",
function(event) {

if (event.key === "Enter") {

zkontrolujHeslo();

}

});

</script>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas =
document.getElementById("magicDust");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const particles = [];

class Particle {

constructor(){

this.reset();

}

reset(){

this.x =
Math.random() * canvas.width;

this.y =
Math.random() * canvas.height;

this.size =
Math.random() * 2 + 1;

this.speedX =
(Math.random() - 0.5) * 0.25;

this.speedY =
(Math.random() - 0.5) * 0.25;

this.opacity =
Math.random() * 0.5 + 0.2;

this.glow =
Math.random() * 18 + 8;

}

update(){

this.x += this.speedX;

this.y += this.speedY;

if(
this.x < -50 ||
this.x > canvas.width + 50 ||
this.y < -50 ||
this.y > canvas.height + 50
){

this.reset();

}

}

draw(){

const gradient =
ctx.createRadialGradient(
this.x,
this.y,
0,
this.x,
this.y,
this.glow
);

gradient.addColorStop(
0,
`rgba(255,215,120,${this.opacity})`
);

gradient.addColorStop(
1,
"rgba(255,215,120,0)"
);

ctx.beginPath();

ctx.fillStyle =
gradient;

ctx.arc(
this.x,
this.y,
this.glow,
0,
Math.PI * 2
);

ctx.fill();

}

}

for(let i = 0; i < 80; i++){

particles.push(new Particle());

}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(particle => {

particle.update();

particle.draw();

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize", () => {

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

});

</script>

<!-- PROTECTION -->

<script src="ochrana.js"></script>

</body>

</html>
