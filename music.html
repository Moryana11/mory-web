<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* BODY */

body {

    margin: 0;

    background-color: black;

    text-align: center;

    font-family: Arial, sans-serif;

    color: white;

    overflow-x: hidden;

    position: relative;

}

/* MAGIC DUST */

#magicDust {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    pointer-events: none;

    z-index: 0;

}

/* CONTENT ABOVE EFFECT */

.language-switch,
.back-link,
h1,
.music-container {

    position: relative;

    z-index: 2;

}

/* LANGUAGE SWITCH */

.language-switch {

    position: fixed;

    top: 15px;

    right: 15px;

    z-index: 999999;

    display: flex;

    gap: 12px;

    align-items: center;

}

/* LANGUAGE LINKS */

.language-switch a {

    font-family: 'MedievalSharp', cursive;

    text-decoration: none;

    color: #d4af37;

    font-size: 22px;

    transition: 0.3s;

    display: inline-block;

}

/* HOVER */

.language-switch a:hover {

    text-shadow:
        0 0 10px #d4af37,
        0 0 20px rgba(212,175,55,0.8);

}

/* ACTIVE LANGUAGE */

.language-switch a.active-lang {

    color: white;

    text-shadow:
        0 0 10px rgba(255,255,255,0.7);

}

/* BACK */

.back-link {

    margin-top: 25px;

}

.back-link a {

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    text-decoration: none;

    font-size: 20px;

    transition: 0.3s;

}

.back-link a:hover {

    text-shadow:
        0 0 10px #d4af37,
        0 0 20px rgba(212,175,55,0.8);

}

/* TITLE */

h1 {

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    font-size: 48px;

    margin-top: 15px;

    text-shadow:
        0 0 12px rgba(212,175,55,0.35);

}

/* MAIN CONTAINER */

.music-container {

    max-width: 950px;

    margin: 40px auto 60px auto;

    padding: 0 20px;

}

/* IMAGE */

.music-image {

    margin-bottom: 45px;

}

.music-image img {

    width: 100%;

    max-width: 300px;

    border-radius: 16px;

    border: 2px solid #d4af37;

    transition: 0.35s;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 18px rgba(212,175,55,0.6);

}

.music-image img:hover {

    transform: scale(1.03);

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 30px rgba(212,175,55,0.9);

}

/* SONG CARD */

.song {

    background:
        rgba(15,15,15,0.88);

    border: 1px solid rgba(212,175,55,0.4);

    border-radius: 18px;

    padding: 28px 20px;

    margin-bottom: 35px;

    box-shadow:
        0 0 22px rgba(212,175,55,0.08);

}

/* SONG TITLE */

.song-title {

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    font-size: 28px;

    margin-bottom: 18px;

    text-shadow:
        0 0 10px rgba(212,175,55,0.35);

}

/* AUDIO PLAYER */

audio {

    width: 100%;

    max-width: 420px;

    filter:
        drop-shadow(0 0 10px rgba(212,175,55,0.25));

}

/* MOBILE */

@media (max-width: 768px) {

    h1 {

        font-size: 38px;

    }

    .song-title {

        font-size: 24px;

    }

    .music-image img {

        max-width: 85%;

    }

    .language-switch {

        top: 12px;

        right: 12px;

        gap: 14px;

    }

    .language-switch a {

        font-size: 20px;

    }

}

</style>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas = document.getElementById("magicDust");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

class Particle {

    constructor(){

        this.reset();

    }

    reset(){

        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        this.size = Math.random() * 2 + 1;

        this.speedX = (Math.random() - 0.5) * 0.25;
        this.speedY = (Math.random() - 0.5) * 0.25;

        this.opacity = Math.random() * 0.5 + 0.2;

        this.glow = Math.random() * 18 + 8;

    }

    update(){

        this.x += this.speedX;
        this.y += this.speedY;

        if(
            this.x < -50 ||
            this.x > canvas.width + 50 ||
            this.y < -50 ||
            this.y > canvas.height + 50
        ){

            this.reset();

        }

    }

    draw(){

        const gradient = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            this.glow
        );

        gradient.addColorStop(
            0,
            `rgba(255,215,120,${this.opacity})`
        );

        gradient.addColorStop(
            1,
            "rgba(255,215,120,0)"
        );

        ctx.beginPath();

        ctx.fillStyle = gradient;

        ctx.arc(
            this.x,
            this.y,
            this.glow,
            0,
            Math.PI * 2
        );

        ctx.fill();

    }

}

for(let i = 0; i < 80; i++){

    particles.push(new Particle());

}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(particle => {

        particle.update();
        particle.draw();

    });

    requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize", () => {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

</script>
