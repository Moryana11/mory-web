<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tajná knihovna</title>

<!-- Fantasy písmo -->

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: #000;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* Nadpis */
h2 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    margin-top: 30px;
    font-size: 32px;
}

/* Jednotný rámeček */
.frame {
    width: 320px;
    max-width: 90%;
    height: auto;

    border-radius: 12px;
    border: 1px solid #c9a646;

    padding: 12px;
    background-color: black;

    box-shadow:
        0 0 6px rgba(201, 166, 70, 0.4);

    display: block;
    margin: 40px auto;

    cursor: pointer;
}

/* Box pro heslo */
.password-box {
    text-align: center;
    margin-top: 20px;
}

/* Pole pro heslo */
.password-box input {
    padding: 10px 14px;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid #c9a646;
    background-color: #111;
    color: white;

    font-family: 'MedievalSharp', cursive;
}

/* Tlačítko */
.password-box button {
    padding: 10px 18px;
    font-size: 18px;
    margin-left: 8px;
    border-radius: 6px;
    border: 1px solid #c9a646;
    background-color: #1a1a1a;
    color: #d4af37;
    cursor: pointer;

    font-family: 'MedievalSharp', cursive;
}

.password-box button:hover {
    background-color: #2a2a2a;
}

/* Chybová zpráva */
.message {
    margin-top: 15px;
    color: #ff6666;
    font-family: 'MedievalSharp', cursive;
}

</style>

</head>

<body>

<h2>Vstup do tajné knihovny</h2>

<a id="odkaz" href="#">
    <img id="dvere" src="dvere_zavrene.png" alt="Zavřené dveře" class="frame">
</a>

<div class="password-box">
    <input type="password" id="heslo" placeholder="Zadej heslo">
    <button onclick="zkontrolujHeslo()">Otevřít dveře</button>
</div>

<p class="message" id="zprava"></p>

<script>
function zkontrolujHeslo() {

    var heslo = document.getElementById("heslo").value;

    if (heslo === "knihovna") {

        document.getElementById("dvere").src = "dvere_otevrene.png";

        document.getElementById("odkaz").href = "hlavni.html";

        document.getElementById("zprava").textContent =
        "Dveře se otevírají.";

    } else {

        window.location.href = "retezove_dvere.html";

    }
}
</script>

</body>
</html>
