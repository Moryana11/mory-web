<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tajná knihovna</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #111;
    color: white;
    text-align: center;
    margin: 0;
}

header {
    background: #222;
    padding: 20px;
}

img {
    width: 320px;
    max-width: 90%;
    height: auto;

    border-radius: 14px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 12px rgba(212, 175, 55, 0.6),
        0 0 25px rgba(212, 175, 55, 0.3);

    margin-top: 30px;
}

input {
    padding: 10px;
    margin-top: 20px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-left: 10px;
    cursor: pointer;
}

.message {
    margin-top: 15px;
    color: #ff6666;
}
</style>

</head>

<body>

<a id="odkaz" href="#">
    <img id="dvere" src="dvere_zavrene.png" alt="Zavřené dveře">
</a>

<br>

<input type="password" id="heslo" placeholder="Zadej heslo">
<button onclick="zkontrolujHeslo()">Otevřít dveře</button>

<p class="message" id="zprava"></p>

<script>
function zkontrolujHeslo() {

    var heslo = document.getElementById("heslo").value;

  if (heslo === "knihovna") {

    document.getElementById("dvere").src = "dvere_otevrene.png";

    document.getElementById("odkaz").href = "hlavni.html";

    document.getElementById("zprava").textContent =
        "Dveře jsou otevřené. Klikni na ně.";

} else {

        window.location.href = "retezove_dvere.html";

    }
}
</script>

</body>
</html>
