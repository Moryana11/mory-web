<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vstup do knihovny</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* PŘEPÍNAČ JAZYKA */

.language-switch {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 22px;
    z-index: 1000;
}

.language-switch a {
    text-decoration: none;
    margin-left: 8px;
}

/* KONTEJNER */

.container {
    margin-top: 40px;
}

/* DVEŘE */

#dvere {
    width: 100%;
    max-width: 350px;
    border-radius: 12px;
    border: 2px solid #d4af37;
    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);
    cursor: pointer;
}

/* TEXT */

label {
    display: block;
    margin-top: 25px;
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 22px;
}

/* INPUT + IKONA */

.password-wrapper {
    position: relative;
    display: inline-block;
}

.password-wrapper input {
    margin-top: 15px;
    padding: 10px;
    padding-right: 40px;
    width: 250px;
    max-width: 80%;
    font-size: 16px;
}

.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    user-select: none;
}

/* TLAČÍTKO */

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}

</style>

</head>

<body>

<div class="language-switch">

<a href="#" onclick="setLang('cz')">🇨🇿</a>
<a href="#" onclick="setLang('en')">🇬🇧</a>

</div>

<div class="container">

<img id="dvere"
src="dvere_zavrene.png"
alt="Zavřené dveře">

<label id="labelText">
Zadej heslo
</label>

<div class="password-wrapper">

<input type="password"
id="heslo"
placeholder="Zadej heslo">

<span class="toggle-password"
onclick="togglePassword()">
👁️
</span>

</div>

<br>

<button onclick="zkontrolujHeslo()">
Vstoupit
</button>

</div>

<script>

/* výchozí jazyk */

var lang =
localStorage.getItem("lang") || "cz";

applyLanguage();

function setLang(l) {

localStorage.setItem("lang", l);

lang = l;

applyLanguage();

}

/* PŘEKLAD TEXTŮ */

function applyLanguage() {

if (lang === "en") {

document.getElementById("labelText")
.innerText = "Enter password";

document.getElementById("heslo")
.placeholder = "Enter password";

document.querySelector("button")
.innerText = "Enter";

} else {

document.getElementById("labelText")
.innerText = "Zadej heslo";

document.getElementById("heslo")
.placeholder = "Zadej heslo";

document.querySelector("button")
.innerText = "Vstoupit";

}

}

/* ZOBRAZENÍ / SKRYTÍ HESLA */

function togglePassword() {

var input =
document.getElementById("heslo");

if (input.type === "password") {
    input.type = "text";
} else {
    input.type = "password";
}

}

/* KONTROLA HESLA */

function zkontrolujHeslo() {

var heslo =
document.getElementById("heslo").value;

/* CZ heslo */
var czHeslo = "knihovna";

/* EN heslo */
var enHeslo = "library";

var zadane =
heslo.trim().toLowerCase();

if (
    (lang === "cz" && zadane === czHeslo) ||
    (lang === "en" && zadane === enHeslo)
) {

document.getElementById("dvere").src =
"dvere_otevrene.png";

if (lang === "en") {

document.getElementById("labelText")
.innerText =
"The door is opening. Click on it.";

} else {

document.getElementById("labelText")
.innerText =
"Dveře se otevírají. Klikni na ně.";

}

document.getElementById("dvere").onclick =
function() {

if (lang === "en") {

window.location.href =
"hlavni_en.html";

} else {

window.location.href =
"hlavni.html";

}

};

}

else {

if (lang === "en") {

window.location.href =
"retezove_dvere_en.html";

} else {

window.location.href =
"retezove_dvere.html";

}

}

}

/* ENTER klávesa */

document
.getElementById("heslo")
.addEventListener("keypress",
function(event) {

if (event.key === "Enter") {
    zkontrolujHeslo();
}

});

</script>

<!-- OCHRANA -->

<script src="ochrana.js"></script>

</body>

</html>
