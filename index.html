<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vstup</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* OBRÁZEK DVEŘÍ */
img {
    width: 100%;
    max-width: 350px;
    height: auto;
    margin-top: 40px;
    border-radius: 12px;
    border: 2px solid #d4af37;
    box-shadow: 0 0 10px rgba(212,175,55,0.6);
}

/* TEXT */
p {
    color: #d4af37;
    font-family: 'MedievalSharp', cursive;
    font-size: 18px;
    margin-top: 20px;
}

/* INPUT */
input {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
}

/* TLAČÍTKO */
button {
    padding: 10px 20px;
    margin-top: 10px;
    font-size: 16px;
    cursor: pointer;
}

/* MOBIL */
@media (max-width: 768px) {

    img {
        max-width: 280px;
    }

    p {
        font-size: 20px;
    }

}
</style>

</head>

<body>

<img src="zavrene_dvere.png" alt="Zavřené dveře">

<p>Zadej heslo</p>

<input type="password" id="heslo">
<br>
<button onclick="zkontrolujHeslo()">Vstoupit</button>

<script>
function zkontrolujHeslo() {
    var heslo = document.getElementById("heslo").value;

    if (heslo === "tajna") {
        window.location.href = "otevrene_dvere.html";
    } else {
        window.location.href = "retezove_dvere.html";
    }
}
</script>

</body>
</html>
