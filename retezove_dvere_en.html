<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Locked Door</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* BODY */

body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    position: relative;
}

/* MAGIC DUST */

#magicDust{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

/* CONTENT ABOVE EFFECT */

.language-switch,
.door-container,
p {
    position: relative;
    z-index: 2;
}

/* LANGUAGE SWITCH */

.language-switch {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 22px;
}

.language-switch a {
    text-decoration: none;
    margin-left: 8px;
}

/* DOOR */

.door-container {
    margin-top: 40px;
}

img {

    width: 100%;
    max-width: 350px;

    border-radius: 12px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);

    cursor: pointer;

    transition: 0.35s;

}

img:hover {

    transform: scale(1.02);

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 24px rgba(212,175,55,0.9);

}

/* TEXT */

p {

    margin-top: 25px;

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    font-size: 24px;

    text-shadow:
        0 0 10px rgba(212,175,55,0.35);

    line-height: 1.6;

}

/* MOBILE */

@media (max-width: 768px) {

    img {
        max-width: 90%;
    }

    p {
        font-size: 20px;
        padding: 0 15px;
    }

}

</style>

</head>

<body>

<!-- MAGIC DUST -->

<canvas id="magicDust"></canvas>

<!-- LANGUAGE SWITCH -->

<div class="language-switch">

<a href="#" onclick="setLang('cz')">🇨🇿</a>
<a href="#" onclick="setLang('en')">EN</a>

</div>

<!-- DOOR -->

<div class="door-container">

<img
id="dvere"
src="retezove_dvere.png"
onclick="vratSe()"
alt="Locked Door">

</div>

<!-- TEXT -->

<p id="text"></p>

<script>

var lang =
localStorage.getItem("lang") || "en";

applyLanguage();

function setLang(l) {

localStorage.setItem("lang", l);

lang = l;

applyLanguage();

}

/* TEXT */

function applyLanguage() {

var text =
document.getElementById("text");

if (lang === "en") {

document.title =
"Locked Door";

text.innerHTML =
"The door remains locked.<br>Click on the door and try again.";

} else {

document.title =
"Zamčené dveře";

text.innerHTML =
"Dveře zůstávají zamčené.<br>Klikni na dveře a zkus to znovu.";

}

}

/* RETURN TO PASSWORD PAGE */

function vratSe() {

window.location.href =
"index_en.html";

}

</script>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas = document.getElementById("magicDust");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

class Particle {

    constructor(){
        this.reset();
    }

    reset(){

        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        this.size = Math.random() * 2 + 1;

        this.speedX = (Math.random() - 0.5) * 0.25;
        this.speedY = (Math.random() - 0.5) * 0.25;

        this.opacity = Math.random() * 0.5 + 0.2;

        this.glow = Math.random() * 18 + 8;
    }

    update(){

        this.x += this.speedX;
        this.y += this.speedY;

        if(
            this.x < -50 ||
            this.x > canvas.width + 50 ||
            this.y < -50 ||
            this.y > canvas.height + 50
        ){
            this.reset();
        }
    }

    draw(){

        const gradient = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            this.glow
        );

        gradient.addColorStop(
            0,
            `rgba(255,215,120,${this.opacity})`
        );

        gradient.addColorStop(
            1,
            "rgba(255,215,120,0)"
        );

        ctx.beginPath();

        ctx.fillStyle = gradient;

        ctx.arc(
            this.x,
            this.y,
            this.glow,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }

}

for(let i = 0; i < 80; i++){
    particles.push(new Particle());
}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(particle => {
        particle.update();
        particle.draw();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

</script>

<!-- PROTECTION -->

<script src="ochrana.js"></script>

<!-- LANGUAGE SWITCH -->

<script src="language-switch.js"></script>

</body>
</html>
