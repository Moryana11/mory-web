<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Galerie</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Navigace */
nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    color: #f1d27a;
}

/* Nadpis */
h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 36px;
}

/* Galerie */
.gallery {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.gallery img {
    width: 250px;
    border-radius: 10px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 8px rgba(212,175,55,0.6),
        0 0 18px rgba(212,175,55,0.4);

    cursor: pointer;
}

/* Lightbox */
#lightbox {
    display: none;

    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background-color: rgba(0,0,0,0.9);

    justify-content: center;
    align-items: center;

    z-index: 999;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;

    border-radius: 10px;

    border: 2px solid #d4af37;
}

/* Číslování stránek */
.pagination {
    margin: 40px 0;
}

.pagination a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    margin: 0 8px;
    font-size: 18px;
}

.pagination a:hover {
    color: #f1d27a;
}

.pagination a.active {
    color: white;
    font-weight: bold;
}

</style>

</head>

<body>

<nav>
    <a href="hlavni.html">Domů</a>
</nav>

<h1>Galerie</h1>

<div class="gallery">

<img src="obrazek1.png" onclick="openLightbox(this)">
<img src="obrazek2.png" onclick="openLightbox(this)">
<img src="obrazek3.png" onclick="openLightbox(this)">

</div>

<div class="pagination">

<a href="#" class="active">1</a> <a href="galerie2.html">2</a> <a href="galerie3.html">3</a> <a href="galerie4.html">4</a> <a href="galerie5.html">5</a> <a href="galerie6.html">6</a> <a href="galerie7.html">7</a> <a href="galerie8.html">8</a> <a href="galerie9.html">9</a>

</div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script>

function openLightbox(img) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
