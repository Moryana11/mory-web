<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* PŘEPÍNAČ JAZYKA */

.language-switch {
position: fixed;
top: 15px;
right: 20px;
font-size: 22px;
z-index: 1000;
}

.language-switch a {
text-decoration: none;
margin-left: 8px;
}

/* BODY */

body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* DOMŮ */

nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

/* NADPIS */

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 42px;
    margin-top: 10px;
}

/* GALERIE */

.gallery {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.gallery img {
    width: 100%;
    max-width: 300px;
    height: auto;
    cursor: pointer;

    border-radius: 12px;
    border: 2px solid #d4af37;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);
}

/* OVERLAY */

.overlay {
    display: none;

    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background-color: rgba(0,0,0,0.95);

    justify-content: center;
    align-items: center;

    z-index: 999;
}

.overlay img {
    max-width: 90%;
    max-height: 90%;
}

/* ŠIPKY */

.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 50px;
    color: #d4af37;
    cursor: pointer;
    user-select: none;
    padding: 15px;
}

.arrow-left {
    left: 20px;
}

.arrow-right {
    right: 20px;
}

/* STRÁNKOVÁNÍ */

.pagination {
    margin-top: 40px;
}

.pagination a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    margin: 0 8px;
}

.pagination a.active {
    color: white;
    font-weight: bold;
}

/* MOBIL */

@media (max-width: 768px) {

    .gallery {
        flex-direction: column;
        align-items: center;
        gap: 25px;
    }

    .gallery img {
        max-width: 90%;
    }

    .arrow {
        font-size: 40px;
    }

}

</style>

</head>

<body>

<div class="language-switch">

<a href="galerie4.html">🇨🇿</a> <a href="gallery4_en.html">🇬🇧</a>

</div>

<nav>
<a href="hlavni.html">Domů</a>
</nav>

<h1>Galerie</h1>

<div class="gallery">

<img src="10.png" onclick="openImage(0)">
<img src="11.png" onclick="openImage(1)">
<img src="12.png" onclick="openImage(2)">

</div>

<div class="overlay" id="overlay">

<div class="arrow arrow-left" onclick="prevImage()">←</div>

<img id="bigImage">

<div class="arrow arrow-right" onclick="nextImage()">→</div>

</div>

<div class="pagination">

<a href="galerie.html">1</a> <a href="galerie2.html">2</a> <a href="galerie3.html">3</a> <a href="#" class="active">4</a> <a href="galerie5.html">5</a> <a href="galerie6.html">6</a> <a href="galerie7.html">7</a> <a href="galerie8.html">8</a> <a href="galerie9.html">9</a>

</div>

<script>

var images = [
"10.png",
"11.png",
"12.png"
];

var currentIndex = 0;

/* nastavení stránek */

var nextPage = "galerie5.html";
var prevPage = "galerie3.html";

/* otevření obrázku */

function openImage(index) {

currentIndex = index;

document.getElementById("bigImage").src =
images[currentIndex];

document.getElementById("overlay").style.display =
"flex";

}

/* další obrázek */

function nextImage() {

currentIndex++;

if (currentIndex >= images.length) {

if (nextPage) {

window.location.href = nextPage;
return;

}

currentIndex = images.length - 1;

}

document.getElementById("bigImage").src =
images[currentIndex];

}

/* předchozí obrázek */

function prevImage() {

currentIndex--;

if (currentIndex < 0) {

if (prevPage) {

window.location.href = prevPage;
return;

}

currentIndex = 0;

}

document.getElementById("bigImage").src =
images[currentIndex];

}

/* zavření kliknutím mimo */

document.getElementById("overlay")
.addEventListener("click", function(e) {

if (e.target.id === "overlay") {

document.getElementById("overlay").style.display =
"none";

}

});

/* klávesnice */

document.addEventListener("keydown", function(e) {

if (e.key === "ArrowRight") nextImage();

if (e.key === "ArrowLeft") prevImage();

if (e.key === "Escape") {

document.getElementById("overlay").style.display =
"none";

}

});

</script>

</body>
</html>
