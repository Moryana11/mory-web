<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* LANGUAGE SWITCH */

.language-switch {

position: fixed;

top: 15px;

right: 20px;

font-size: 22px;

z-index: 1000;

}

.language-switch a {

text-decoration: none;

margin-left: 8px;

}

/* BODY */

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

/* BACK LINK */

.back-link {
    margin-top: 25px;
}

.back-link a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

/* TITLE */

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 42px;
    margin-top: 10px;
}

/* IMAGE */

.message-image {
    margin-top: 25px;
}

.message-image img {

    width: 100%;
    max-width: 260px;

    border-radius: 12px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);

}

/* FORM */

form {

    margin-top: 30px;

}

input, textarea {

    width: 300px;

    max-width: 90%;

    padding: 10px;

    margin: 8px;

    border-radius: 6px;

    border: none;

}

button {

    margin-top: 10px;

    padding: 10px 20px;

    font-family: 'MedievalSharp', cursive;

    background-color: #d4af37;

    color: black;

    border: none;

    border-radius: 6px;

    cursor: pointer;

}

button:hover {

    opacity: 0.8;

}

/* MESSAGES */

.message {

    border: 1px solid #d4af37;

    border-radius: 8px;

    padding: 12px;

    margin: 15px auto;

    max-width: 500px;

}

.message-name {

    font-weight: bold;

    color: #d4af37;

}

.message-date {

    font-size: 14px;

    color: #ccc;

    margin-bottom: 6px;

}

/* MOBILE */

@media (max-width: 768px) {

    h1 {
        font-size: 34px;
    }

}

</style>

</head>

<body>

<div class="language-switch">

<a href="vzkazy.html">🇨🇿</a>

<a href="messages.html">🇬🇧</a>

</div>

<div class="back-link">
<a href="hlavni_en.html">← Back to main page</a>
</div>

<h1>Messages</h1>

<div class="message-image">

<img src="vzkazy.png" alt="Messages">

</div>

<form id="messageForm">

<input
type="text"
id="name"
placeholder="Your name or nickname"
required

>

<br>

<textarea
id="text"
rows="4"
placeholder="Write your message..."
required
></textarea>

<br>

<button type="submit">
Send message
</button>

</form>

<div id="messages"></div>

<script>

var form =
document.getElementById("messageForm");

var messagesDiv =
document.getElementById("messages");

function loadMessages() {

messagesDiv.innerHTML = "";

var messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

messages.forEach(function(msg, index) {

var div =
document.createElement("div");

div.className = "message";

div.innerHTML =

"<div class='message-name'>" +
msg.name +
"</div>" +

"<div class='message-date'>" +
msg.date +
"</div>" +

"<div>" +
msg.text +
"</div>" +

"<br>" +

"<button onclick='deleteMessage(" +
index +
")'>Delete</button>";

messagesDiv.appendChild(div);

});

}

form.addEventListener("submit", function(e) {

e.preventDefault();

var name =
document.getElementById("name").value;

var text =
document.getElementById("text").value;

var date =
new Date().toLocaleString();

var messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

messages.push({

name: name,
text: text,
date: date

});

localStorage.setItem(
"messages",
JSON.stringify(messages)
);

form.reset();

loadMessages();

});

function deleteMessage(index) {

var messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

messages.splice(index, 1);

localStorage.setItem(
"messages",
JSON.stringify(messages)
);

loadMessages();

}

loadMessages();

</script>

</body>
</html>
