<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* BODY */

body {

margin: 0;

background-color: black;

text-align: center;

font-family: Arial, sans-serif;

color: white;

overflow-x: hidden;

position: relative;

}

/* MAGIC DUST */

#magicDust{

position: fixed;

top: 0;

left: 0;

width: 100%;

height: 100%;

pointer-events: none;

z-index: 0;

}

/* CONTENT ABOVE EFFECT */

.language-switch,
.back-link,
h1,
.message-image,
.message-container,
#messages {

position: relative;

z-index: 2;

}

/* LANGUAGE SWITCH */

.language-switch {

position: fixed;

top: 15px;

right: 25px;

z-index: 99999;

display: flex;

gap: 12px;

align-items: center;

}

.language-switch a {

font-family: 'MedievalSharp', cursive;

text-decoration: none;

color: #d4af37;

font-size: 22px;

transition: 0.3s;

}

.language-switch a:hover {

text-shadow:
0 0 10px #d4af37,
0 0 20px rgba(212,175,55,0.8);

}

/* ACTIVE LANGUAGE */

.language-switch a.active-lang {

color: white;

text-shadow:
0 0 10px rgba(255,255,255,0.7);

}

/* BACK LINK */

.back-link {

margin-top: 25px;

}

.back-link a {

font-family: 'MedievalSharp', cursive;

color: #d4af37;

text-decoration: none;

font-size: 20px;

transition: 0.3s;

}

.back-link a:hover {

text-shadow:
0 0 10px #d4af37,
0 0 20px rgba(212,175,55,0.8);

}

/* TITLE */

h1 {

font-family: 'MedievalSharp', cursive;

color: #d4af37;

font-size: 48px;

margin-top: 15px;

text-shadow:
0 0 12px rgba(212,175,55,0.35);

}

/* IMAGE */

.message-image {

margin-top: 30px;

}

.message-image img {

width: 100%;

max-width: 280px;

border-radius: 14px;

border: 2px solid #d4af37;

box-shadow:
0 0 0 2px #d4af37,
0 0 16px rgba(212,175,55,0.6);

}

/* FORM CONTAINER */

.message-container {

max-width: 650px;

margin: 40px auto;

padding: 35px 25px;

border-radius: 18px;

background:
rgba(15,15,15,0.88);

border: 1px solid rgba(212,175,55,0.4);

box-shadow:
0 0 25px rgba(212,175,55,0.08);

}

/* FORM */

form {

display: flex;

flex-direction: column;

align-items: center;

}

/* INPUTS */

input,
textarea {

width: 100%;

max-width: 500px;

padding: 14px;

margin-bottom: 16px;

border-radius: 10px;

border: 1px solid #d4af37;

background: rgba(20,20,20,0.95);

color: white;

font-size: 16px;

outline: none;

transition: 0.3s;

box-sizing: border-box;

}

textarea {

resize: vertical;

min-height: 140px;

}

input:focus,
textarea:focus {

box-shadow:
0 0 14px rgba(212,175,55,0.7);

}

/* BUTTON */

button {

margin-top: 5px;

padding: 13px 28px;

font-family: 'MedievalSharp', cursive;

font-size: 19px;

background-color: #d4af37;

color: black;

border: none;

border-radius: 10px;

cursor: pointer;

transition: 0.3s;

}

button:hover {

transform: scale(1.03);

box-shadow:
0 0 18px rgba(212,175,55,0.8);

}

/* MESSAGES */

#messages {

margin-top: 10px;

padding-bottom: 50px;

}

.message {

border: 1px solid rgba(212,175,55,0.55);

border-radius: 14px;

padding: 18px;

margin: 22px auto;

max-width: 650px;

background: rgba(15,15,15,0.9);

box-shadow:
0 0 16px rgba(212,175,55,0.12);

text-align: left;

}

.message-name {

font-family: 'MedievalSharp', cursive;

color: #d4af37;

margin-bottom: 6px;

font-size: 22px;

}

.message-date {

font-size: 14px;

color: #bbbbbb;

margin-bottom: 14px;

}

.message-text {

line-height: 1.8;

font-size: 17px;

word-wrap: break-word;

}

/* MOBILE */

@media (max-width: 768px) {

h1 {

font-size: 38px;

}

.message-container {

width: 88%;

padding: 28px 18px;

}

.message {

width: 88%;

}

.language-switch {

right: 15px;

top: 12px;

}

.language-switch a {

font-size: 20px;

}

}

</style>

</head>

<body>

<!-- MAGIC DUST -->

<canvas id="magicDust"></canvas>

<!-- LANGUAGE SWITCH -->

<div class="language-switch">

<a href="vzkazy.html">
CZ
</a>

<a href="messages.html"
class="active-lang">
EN
</a>

</div>

<!-- BACK -->

<div class="back-link">

<a href="hlavni_en.html">
← Back to Main page
</a>

</div>

<!-- TITLE -->

<h1>Messages</h1>

<!-- IMAGE -->

<div class="message-image">

<img src="vzkazy.png" alt="Messages">

</div>

<!-- FORM -->

<div class="message-container">

<form id="messageForm">

<input
type="text"
id="name"
placeholder="Your name or nickname"
required>

<textarea
id="text"
placeholder="Write your message..."
required></textarea>

<button type="submit">

Send Message

</button>

</form>

</div>

<!-- MESSAGES -->

<div id="messages"></div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyAn9wU2f0jqQ0XVymjMLr8HSFM4fJbXiGI",

authDomain: "ohen-a-voda.firebaseapp.com",

projectId: "ohen-a-voda",

storageBucket: "ohen-a-voda.firebasestorage.app",

messagingSenderId: "668572551776",

appId: "1:668572551776:web:24dbc649470e620f339105"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ELEMENTS */

const form =
document.getElementById("messageForm");

const messagesDiv =
document.getElementById("messages");

/* LOAD MESSAGES */

async function loadMessages() {

messagesDiv.innerHTML = "";

const q = query(
collection(db, "messages")
);

const querySnapshot =
await getDocs(q);

querySnapshot.forEach((docItem) => {

const msg = docItem.data();

const div =
document.createElement("div");

div.className = "message";

div.innerHTML =

"<div class='message-name'>" +
escapeHtml(msg.name) +
"</div>" +

"<div class='message-date'>" +
msg.date +
"</div>" +

"<div class='message-text'>" +
escapeHtml(msg.text).replace(/\n/g, "<br>") +
"</div>";

messagesDiv.appendChild(div);

});

}

/* SEND MESSAGE */

form.addEventListener("submit", async function(e) {

e.preventDefault();

const name =
document.getElementById("name").value.trim();

const text =
document.getElementById("text").value.trim();

if(name === "" || text === "") {
return;
}

const date =
new Date().toLocaleString();

await addDoc(
collection(db, "messages"),
{
name,
text,
date
}
);

form.reset();

loadMessages();

});

/* ESCAPE HTML */

function escapeHtml(text) {

const div =
document.createElement("div");

div.innerText = text;

return div.innerHTML;

}

loadMessages();

</script>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas =
document.getElementById("magicDust");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const particles = [];

class Particle {

constructor(){

this.reset();

}

reset(){

this.x =
Math.random() * canvas.width;

this.y =
Math.random() * canvas.height;

this.size =
Math.random() * 2 + 1;

this.speedX =
(Math.random() - 0.5) * 0.25;

this.speedY =
(Math.random() - 0.5) * 0.25;

this.opacity =
Math.random() * 0.5 + 0.2;

this.glow =
Math.random() * 18 + 8;

}

update(){

this.x += this.speedX;

this.y += this.speedY;

if(
this.x < -50 ||
this.x > canvas.width + 50 ||
this.y < -50 ||
this.y > canvas.height + 50
){

this.reset();

}

}

draw(){

const gradient =
ctx.createRadialGradient(
this.x,
this.y,
0,
this.x,
this.y,
this.glow
);

gradient.addColorStop(
0,
`rgba(255,215,120,${this.opacity})`
);

gradient.addColorStop(
1,
"rgba(255,215,120,0)"
);

ctx.beginPath();

ctx.fillStyle =
gradient;

ctx.arc(
this.x,
this.y,
this.glow,
0,
Math.PI * 2
);

ctx.fill();

}

}

for(let i = 0; i < 80; i++){

particles.push(new Particle());

}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(particle => {

particle.update();

particle.draw();

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize", () => {

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

});

</script>

<!-- PROTECTION -->

<script src="ochrana.js"></script>

</body>
</html>
