<!DOCTYPE html>
<html lang="cs">
<head>

<title>Můj svět příběhů</title>

<style>

    margin: 0;
    background-color: black;
    color: #d4af37;
    font-family: Georgia, serif;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}

img {
    width: 320px;
    height: 320px;
    object-fit: cover;
    border-radius: 50%;

    margin-bottom: 30px;

h1 {
    font-size: 36px;

    margin-bottom: 25px;
}

p {
    font-size: 20px;
    line-height: 1.7;
    color: #f0e6c0;
}

.frame {
    border: 2px solid #d4af37;
    padding: 30px;
    border-radius: 16px;
}

</style>
</head>

<body>

<div class="container">

<div class="frame">

<img src="scenes01.png" alt="Proč píšu knihu">

<h1>PROČ PÍŠU KNIHU</h1>

<p>
Psaní příběhů je pro mě něco, co mě opravdu baví a naplňuje.<br><br>

Je to svět, do kterého se mohu ponořit, když si potřebuji odpočinout<br>
nebo si srovnat myšlenky a emoce.
</p>

</div>

</div>
