<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Můj svět příběhů</title>

<style>

body {
    margin: 0;
    background-color: black;
    color: #d4af37;
    font-family: Georgia, serif;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}

img {
    width: 260px;
    height: 260px;
    object-fit: cover;
    border-radius: 50%;

    border: 4px solid #d4af37;

    padding: 6px;
    background-color: black;

    box-shadow:
        0 0 12px rgba(212, 175, 55, 0.6),
        0 0 25px rgba(212, 175, 55, 0.3);

    display: block;
    margin: 30px auto;
}
}

h1 {
    font-size: 36px;
    letter-spacing: 3px;
    margin-bottom: 25px;
}

p {
    font-size: 20px;
    line-height: 1.7;
    color: #f0e6c0;
}

.frame {
    border: 2px solid #d4af37;
    padding: 30px;
    border-radius: 16px;
}

</style>
</head>

<body>

<div class="container">

<div class="frame">

<img src="scenes01.png" alt="Proč píšu knihu">


<p>
Psaní příběhů je pro mě něco, co mě opravdu baví a naplňuje.<br><br>

Je to svět, do kterého se mohu ponořit, když si potřebuji odpočinout<br>
nebo si srovnat myšlenky a emoce.
</p>

</div>

</div>

</body>
</html>
