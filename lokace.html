.location-name {

}

    margin-top: 40px;

.pagination a {

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    text-decoration: none;

    font-size: 26px;

    margin: 0 25px;

/* MOBIL */

@media (max-width: 768px) {

        font-size: 34px;
    }

    .locations {
