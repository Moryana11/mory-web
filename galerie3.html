<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Galerie</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Navigace */
nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    color: #f1d27a;
}

/* Nadpis */
h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 36px;
    margin-top: 10px;
}

/* Řada obrázků */
.gallery {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
    flex-wrap: wrap;
}

/* Obrázky */
.gallery img {
    width: 250px;
    border-radius: 10px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 8px rgba(212,175,55,0.6),
        0 0 18px rgba(212,175,55,0.4);

    transition: transform 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Číslování stránek */
.pagination {
    margin: 40px 0;
}

.pagination a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    margin: 0 8px;
    font-size: 18px;
}

.pagination a:hover {
    color: #f1d27a;
}

/* Aktuální stránka */
.pagination a.active {
    color: white;
    font-weight: bold;
}

</style>

</head>

<body>

<nav>
    <a href="hlavni.html">Domů</a>
</nav>

<h1>Galerie</h1>

<div class="gallery">

<img src="obrazek7.png" alt="Obrázek 7">
<img src="obrazek8.png" alt="Obrázek 8">
<img src="obrazek9.png" alt="Obrázek 9">

</div>

<div class="pagination">

<a href="galerie.html">1</a> <a href="galerie2.html">2</a> <a href="#" class="active">3</a> <a href="galerie4.html">4</a> <a href="galerie5.html">5</a> <a href="galerie6.html">6</a> <a href="galerie7.html">7</a> <a href="galerie8.html">8</a> <a href="galerie9.html">9</a>

</div>

</body>
</html>
