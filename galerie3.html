<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Galerie</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
}

nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 36px;
}

/* Galerie */
.gallery {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.gallery img {
    width: 250px;
    border-radius: 10px;
    border: 2px solid #d4af37;
    box-shadow: 0 0 8px rgba(212,175,55,0.6);
    cursor: pointer;
}

/* Lightbox */
#lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border: 2px solid #d4af37;
}

/* Šipky */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 50px;
    color: #d4af37;
    cursor: pointer;
    user-select: none;
    padding: 20px;
}

.arrow:hover {
    color: white;
}

#prev {
    left: 20px;
}

#next {
    right: 20px;
}

/* Číslování */
.pagination {
    margin: 40px 0;
}

.pagination a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    margin: 0 8px;
}

.pagination a.active {
    color: white;
    font-weight: bold;
}
</style>

</head>

<body>

<nav>
<a href="hlavni.html">Domů</a>
</nav>

<h1>Galerie</h1>

<div class="gallery">

<img src="7.png" onclick="openLightbox(0)">
<img src="8.png" onclick="openLightbox(1)">
<img src="9.png" onclick="openLightbox(2)">

</div>

<div class="pagination">
<a href="galerie.html">1</a>
<a href="galerie2.html">2</a>
<a href="#" class="active">3</a>
<a href="galerie4.html">4</a>
<a href="galerie5.html">5</a>
<a href="galerie6.html">6</a>
<a href="galerie7.html">7</a>
<a href="galerie8.html">8</a>
<a href="galerie9.html">9</a>
</div>

<div id="lightbox">
<span id="prev" class="arrow" onclick="changeImage(-1)">❮</span>

<img id="lightbox-img">

<span id="next" class="arrow" onclick="changeImage(1)">❯</span>

</div>

<script>

let images = [
"7.png",
"8.png",
"9.png"
];

let currentIndex = 0;

function openLightbox(index) {
currentIndex = index;
document.getElementById("lightbox").style.display = "flex";
document.getElementById("lightbox-img").src = images[currentIndex];
}

function changeImage(direction) {
currentIndex += direction;

if (currentIndex < 0) {
currentIndex = images.length - 1;
}

if (currentIndex >= images.length) {
currentIndex = 0;
}

document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox() {
document.getElementById("lightbox").style.display = "none";
}

document.getElementById("lightbox").addEventListener("click", function(e) {
if (e.target === this) {
closeLightbox();
}
});

document.addEventListener("keydown", function(e) {

if (e.key === "Escape") {
closeLightbox();
}

if (e.key === "ArrowRight") {
changeImage(1);
}

if (e.key === "ArrowLeft") {
changeImage(-1);
}

});

</script>

</body>
</html>
