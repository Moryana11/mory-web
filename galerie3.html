<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* DOMŮ */
nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

/* NADPIS */
h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 42px;
    margin-top: 10px;
}

/* KONTEJNER */
.gallery {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
    flex-wrap: wrap;
}

/* OBRÁZKY */
.gallery img {
    width: 100%;
    max-width: 300px;
    height: auto;

    cursor: pointer;

    border-radius: 12px;
    border: 2px solid #d4af37;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);
}

/* ZVĚTŠENÝ OBRÁZEK */
.overlay {
    display: none;

    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background-color: rgba(0,0,0,0.9);

    justify-content: center;
    align-items: center;

    z-index: 999;
}

.overlay img {
    max-width: 95%;
    max-height: 95%;
}

/* STRÁNKOVÁNÍ */
.pagination {
    margin-top: 40px;
}

.pagination a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    margin: 0 8px;
}

.pagination a.active {
    color: white;
    font-weight: bold;
}

/* MOBIL */
@media (max-width: 768px) {

    .gallery {
        flex-direction: column;
        align-items: center;
        gap: 25px;
    }

    .gallery img {
        max-width: 90%;
    }

}
</style>

</head>

<body>

<nav>
<a href="hlavni.html">Domů</a>
</nav>

<h1>Galerie</h1>

<div class="gallery">

<img src="7.png" onclick="openImage(this)">
<img src="8.png" onclick="openImage(this)">
<img src="9.png" onclick="openImage(this)">

</div>

<div class="overlay" id="overlay" onclick="closeImage()">
<img id="bigImage">
</div>

<div class="pagination">

<a href="galerie.html">1</a> <a href="galerie2.html">2</a> <a href="#" class="active">3</a> <a href="galerie4.html">4</a> <a href="galerie5.html">5</a> <a href="galerie6.html">6</a> <a href="galerie7.html">7</a> <a href="galerie8.html">8</a> <a href="galerie9.html">9</a>

</div>

<script>

function openImage(img) {

    var overlay =
    document.getElementById("overlay");

    var bigImage =
    document.getElementById("bigImage");

    bigImage.src = img.src;

    overlay.style.display = "flex";

}

function closeImage() {

    document.getElementById("overlay").style.display = "none";

}

</script>

</body>
</html>
