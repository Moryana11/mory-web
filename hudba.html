<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hudba</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

/* ZPĚT */

.back-link {
    margin-top: 25px;
}

.back-link a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

/* NADPIS */

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 42px;
    margin-top: 20px;
}

/* OBRÁZEK HARFY */

.music-image {
    margin-top: 25px;
}

.music-image img {

    width: 100%;
    max-width: 260px;
    height: auto;

    border-radius: 12px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);

}

/* SEZNAM HUDBY */

.music-list {

    max-width: 800px;

    margin: 40px auto;

    padding: 0 20px;

}

/* JEDNA SKLADBA */

.song {

    margin: 35px 0;

}

/* NÁZEV SKLADBY */

.song-title {

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    font-size: 22px;

    margin-bottom: 10px;

}

/* PŘEHRÁVAČ */

audio {

    width: 100%;

    max-width: 500px;

}

/* MOBIL */

@media (max-width: 768px) {

    h1 {
        font-size: 34px;
    }

    audio {
        max-width: 90%;
    }

    .music-image img {
        max-width: 80%;
    }

}

</style>

</head>

<body>

<div class="back-link">
<a href="hlavni.html">← Zpět na hlavní stranu</a>
</div>

<h1>Hudba</h1>

<div class="music-image">

<img src="harfa.png" alt="Harfa">

</div>

<div class="music-list">

<div class="song">

<div class="song-title">
Skladba 1 – Název písně
</div>

<audio controls>
<source src="song1.mp3" type="audio/mpeg">
Tvůj prohlížeč nepodporuje přehrávání audia.
</audio>

</div>

<div class="song">

<div class="song-title">
Skladba 2 – Název písně
</div>

<audio controls>
<source src="song2.mp3" type="audio/mpeg">
Tvůj prohlížeč nepodporuje přehrávání audia.
</audio>

</div>

<div class="song">

<div class="song-title">
Skladba 3 – Název písně
</div>

<audio controls>
<source src="song3.mp3" type="audio/mpeg">
Tvůj prohlížeč nepodporuje přehrávání audia.
</audio>

</div>

</div>

</body>
</html>
