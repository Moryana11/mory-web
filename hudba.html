<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hudba</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

.back-link {
    margin-top: 25px;
}

.back-link a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 42px;
    margin-top: 20px;
}

.image-box {
    margin-top: 25px;
}

.image-box img {
    width: 100%;
    max-width: 260px;
    border-radius: 12px;
    border: 2px solid #d4af37;
}

.song {
    margin-top: 35px;
}

.song-title {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 22px;
    margin-bottom: 10px;
}

audio {
    width: 90%;
    max-width: 500px;
}

.error {
    color: red;
    font-size: 14px;
    margin-top: 5px;
}

</style>

</head>

<body>

<div class="back-link">
<a href="hlavni.html">← Zpět na hlavní stranu</a>
</div>

<h1>Hudba</h1>

<div class="image-box">
<img src="harfa.png" alt="Hudba">
</div>

<div class="song">
<div class="song-title">Welcome to Kastleton</div>

<audio controls onerror="showError(this)">
<source src="kastleton.mp3" type="audio/mpeg">
</audio>

<div class="error"></div>
</div>

<div class="song">
<div class="song-title">From the Ashes of Loyalty</div>

<audio controls onerror="showError(this)">
<source src="ashes_of_loyalty.mp3" type="audio/mpeg">
</audio>

<div class="error"></div>
</div>

<div class="song">
<div class="song-title">Song of Vienta</div>

<audio controls onerror="showError(this)">
<source src="song_of_vienta.mp3" type="audio/mpeg">
</audio>

<div class="error"></div>
</div>

<div class="song">
<div class="song-title">Under the Banner of New Oaths</div>

<audio controls onerror="showError(this)">
<source src="under_new_oaths.mp3" type="audio/mpeg">
</audio>

<div class="error"></div>
</div>

<script>

function showError(player) {

    var errorBox =
    player.parentElement.querySelector(".error");

    errorBox.textContent =
    "Soubor se nepodařilo načíst.";

}

</script>

</body>
</html>
