<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vzkazy</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* BODY */

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
    position: relative;
}

/* MAGIC DUST */

#magicDust{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

/* PŘEPÍNAČ JAZYKA */

.language-switch {
    position: fixed;
    top: 15px;
    right: 20px;
    z-index: 1000;

    display: flex;
    gap: 10px;
}

.language-switch a {
    text-decoration: none;
    font-size: 22px;
}

/* OBSAH NAD EFEKTEM */

.back-link,
h1,
.message-image,
form,
#messages {
    position: relative;
    z-index: 2;
}

/* ZPĚT */

.back-link {
    margin-top: 25px;
}

.back-link a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 20px;
    transition: 0.3s;
}

.back-link a:hover {
    text-shadow:
        0 0 10px #d4af37,
        0 0 20px rgba(212,175,55,0.8);
}

/* NADPIS */

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 46px;
    margin-top: 15px;
}

/* OBRÁZEK */

.message-image {
    margin-top: 25px;
}

.message-image img {

    width: 100%;
    max-width: 260px;

    border-radius: 12px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);

}

/* FORMULÁŘ */

form {

    margin-top: 35px;

}

input,
textarea {

    width: 320px;

    max-width: 90%;

    padding: 12px;

    margin: 8px;

    border-radius: 8px;

    border: 1px solid #d4af37;

    background: rgba(20,20,20,0.95);

    color: white;

    font-size: 15px;

    outline: none;

}

input:focus,
textarea:focus {

    box-shadow:
        0 0 10px rgba(212,175,55,0.7);

}

/* BUTTON */

button {

    margin-top: 12px;

    padding: 12px 24px;

    font-family: 'MedievalSharp', cursive;

    font-size: 18px;

    background-color: #d4af37;

    color: black;

    border: none;

    border-radius: 8px;

    cursor: pointer;

    transition: 0.3s;

}

button:hover {

    transform: scale(1.03);

    box-shadow:
        0 0 15px rgba(212,175,55,0.8);

}

/* VZKAZ */

.message {

    border: 1px solid #d4af37;

    border-radius: 10px;

    padding: 14px;

    margin: 18px auto;

    max-width: 520px;

    background: rgba(15,15,15,0.9);

    box-shadow:
        0 0 12px rgba(212,175,55,0.15);

}

.message-name {

    font-weight: bold;

    color: #d4af37;

    margin-bottom: 5px;

    font-size: 18px;

}

.message-date {

    font-size: 14px;

    color: #ccc;

    margin-bottom: 10px;

}

/* MOBIL */

@media (max-width: 768px) {

    h1 {
        font-size: 36px;
    }

}

</style>

</head>

<body>

<!-- MAGIC DUST -->

<canvas id="magicDust"></canvas>

<!-- JAZYKY -->

<div class="language-switch">

<a href="vzkazy.html">🇨🇿</a>

<a href="messages.html">🇬🇧</a>

</div>

<!-- ZPĚT -->

<div class="back-link">
<a href="hlavni.html">← Zpět na hlavní stránku</a>
</div>

<!-- NADPIS -->

<h1>Vzkazy</h1>

<!-- OBRÁZEK -->

<div class="message-image">

<img src="vzkazy.png" alt="Vzkazy">

</div>

<!-- FORM -->

<form id="messageForm">

<input
type="text"
id="name"
placeholder="Jméno nebo přezdívka"
required>

<br>

<textarea
id="text"
rows="4"
placeholder="Napiš svůj vzkaz..."
required></textarea>

<br>

<button type="submit">
Odeslat vzkaz
</button>

</form>

<!-- VZKAZY -->

<div id="messages"></div>

<!-- VZKAZY SCRIPT -->

<script>

var form =
document.getElementById("messageForm");

var messagesDiv =
document.getElementById("messages");

function loadMessages() {

messagesDiv.innerHTML = "";

var messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

messages.forEach(function(msg, index) {

var div =
document.createElement("div");

div.className = "message";

div.innerHTML =

"<div class='message-name'>" +
msg.name +
"</div>" +

"<div class='message-date'>" +
msg.date +
"</div>" +

"<div>" +
msg.text +
"</div>" +

"<br>" +

"<button onclick='deleteMessage(" +
index +
")'>Smazat</button>";

messagesDiv.appendChild(div);

});

}

form.addEventListener("submit", function(e) {

e.preventDefault();

var name =
document.getElementById("name").value;

var text =
document.getElementById("text").value;

var date =
new Date().toLocaleString();

var messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

messages.push({

name: name,
text: text,
date: date

});

localStorage.setItem(
"messages",
JSON.stringify(messages)
);

form.reset();

loadMessages();

});

function deleteMessage(index) {

var messages =
JSON.parse(
localStorage.getItem("messages")
) || [];

messages.splice(index, 1);

localStorage.setItem(
"messages",
JSON.stringify(messages)
);

loadMessages();

}

loadMessages();

</script>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas = document.getElementById("magicDust");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

class Particle {

    constructor(){
        this.reset();
    }

    reset(){

        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        this.size = Math.random() * 2 + 1;

        this.speedX = (Math.random() - 0.5) * 0.25;
        this.speedY = (Math.random() - 0.5) * 0.25;

        this.opacity = Math.random() * 0.5 + 0.2;

        this.glow = Math.random() * 18 + 8;
    }

    update(){

        this.x += this.speedX;
        this.y += this.speedY;

        if(
            this.x < -50 ||
            this.x > canvas.width + 50 ||
            this.y < -50 ||
            this.y > canvas.height + 50
        ){
            this.reset();
        }
    }

    draw(){

        const gradient = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            this.glow
        );

        gradient.addColorStop(
            0,
            `rgba(255,215,120,${this.opacity})`
        );

        gradient.addColorStop(
            1,
            "rgba(255,215,120,0)"
        );

        ctx.beginPath();

        ctx.fillStyle = gradient;

        ctx.arc(
            this.x,
            this.y,
            this.glow,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }

}

for(let i = 0; i < 80; i++){
    particles.push(new Particle());
}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(particle => {
        particle.update();
        particle.draw();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

</script>

</body>
</html>
