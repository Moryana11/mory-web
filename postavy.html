<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Postavy</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: #000;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Nadpis */
h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    margin-top: 30px;
}

/* Odkaz zpět */
nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    color: #f1d27a;
}

/* Kontejner pro postavy */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
    margin-top: 30px;
}

/* Rámeček obrázku */
.frame {
    width: 220px;
    height: auto;

    border-radius: 12px;
    border: 1px solid #c9a646;

    padding: 10px;
    background-color: black;

    box-shadow:
        0 0 6px rgba(201, 166, 70, 0.4);

    cursor: pointer;
}

/* Jméno postavy */
.character-name {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    margin-top: 10px;
}

/* Stránkování dole */
.pagination {
    margin-top: 40px;
    margin-bottom: 40px;
}

.pagination a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    margin: 0 10px;
    font-size: 18px;
}

.pagination a:hover {
    color: #f1d27a;
}

</style>

</head>

</div>

<!-- Aaliyah -->

<div>
    <a href="aaliyah.html">
        <img src="aaliyah.png" alt="Aaliyah" class="frame">
    </a>
    <div class="character-name">Aaliyah</div>
</div>

<!-- James -->

<div>
    <a href="james.html">
        <img src="james.png" alt="James" class="frame">
    </a>

</div>
