0 0 12px rgba(212,175,55,0.35);

<!-- DESCRIPTION -->

<div class="description">

<strong>Brienne</strong> je bytost stínu, která na sebe bere podobu mladé a křehké léčitelky z Věže čistého světla.

Je krutá, manipulativní a pomstychtivá, vládne stínovou magií, magií proměny a psychickou kontrolou.

</div>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas = document.getElementById("magicDust");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

class Particle {

constructor(){
this.reset();
}

reset(){

this.x = Math.random() * canvas.width;
this.y = Math.random() * canvas.height;

this.size = Math.random() * 2 + 1;

this.speedX = (Math.random() - 0.5) * 0.25;
this.speedY = (Math.random() - 0.5) * 0.25;

this.opacity = Math.random() * 0.5 + 0.2;

this.glow = Math.random() * 18 + 8;

}

update(){

this.x += this.speedX;
this.y += this.speedY;

if(
this.x < -50 ||
this.x > canvas.width + 50 ||
this.y < -50 ||
this.y > canvas.height + 50
){
this.reset();
}

}

draw(){

const gradient = ctx.createRadialGradient(
this.x,
this.y,
0,
this.x,
this.y,
this.glow
);

gradient.addColorStop(
0,
`rgba(255,215,120,${this.opacity})`
);

gradient.addColorStop(
1,
"rgba(255,215,120,0)"
);

ctx.beginPath();

ctx.fillStyle = gradient;

ctx.arc(
this.x,
this.y,
this.glow,
0,
Math.PI * 2
);

ctx.fill();

}

}

for(let i = 0; i < 80; i++){
particles.push(new Particle());
}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(particle => {
particle.update();
particle.draw();
});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize", () => {

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

});

</script>
