<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>O mně</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: #000;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Navigace */
nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    color: #f1d27a;
}

/* Nadpis */
h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    margin-top: 20px;
    font-size: 32px;
}

/* Kulatý obrázek bez bílého okraje */
.frame {
    width: 240px;
    height: 240px;

    border-radius: 50%;

    border: 2px solid #c9a646;

    padding: 0;

    object-fit: cover;

    background-color: black;

    box-shadow:
        0 0 8px rgba(201, 166, 70, 0.5);

    display: block;
    margin: 30px auto;
}

/* Text */
.about-text {
    color: white;
    font-size: 18px;
    line-height: 1.7;

    max-width: 800px;
    margin: 30px auto 40px auto;
    padding: 0 20px;
}

</style>

</head>

<body>

<nav>
    <a href="hlavni.html">Domů</a>
</nav>

<h1>O mně</h1>

<img src="ja.png" alt="Autorka" class="frame">

<div class="about-text">
Psaní příběhů je pro mě něco, co mě opravdu baví a naplňuje.
Je to svět, do kterého se mohu ponořit, když si potřebuji odpočinout
nebo si srovnat myšlenky a emoce.

</div>

</body>
</html>
