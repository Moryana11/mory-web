<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kapitoly</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* PŘEPÍNAČ JAZYKA */

.language-switch {

position: fixed;

top: 15px;

right: 20px;

font-size: 22px;

z-index: 1000;

}

.language-switch a {

text-decoration: none;

margin-left: 8px;

}

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

/* ZPĚT */

.back-link {
    margin-top: 25px;
}

.back-link a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

/* NADPIS */

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 42px;
    margin-top: 15px;
}

/* ČÍSLA KAPITOL */

.chapter-list {

    margin-top: 40px;

}

.chapter-list a {

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    text-decoration: none;

    font-size: 28px;

    margin: 0 12px;

    padding: 10px 16px;

    border: 2px solid #d4af37;

    border-radius: 8px;

    display: inline-block;

}

.chapter-list a:hover {

    background-color: #d4af37;

    color: black;

}

/* POSLEDNÍ KAPITOLA */

.last-read {

    margin-top: 30px;

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    font-size: 18px;

}

.last-read a {

    color: white;

    text-decoration: underline;

}

</style>

</head>

<body>

<div class="back-link">
<a href="kniha1.html">← Zpět na knihu</a>
</div>

<h1>Kapitoly</h1>

<div class="chapter-list">

<a href="kapitola1.html">1</a> 
<a href="kapitola2.html">2</a> 
<a href="kapitola3.html">3</a> 
<a href="kapitola4.html">4</a> 
<a href="kapitola5.html">5</a> 
<a href="kapitola6.html">6</a> 
<a href="kapitola7.html">7</a> 
<a href="kapitola8.html">8</a>
<a href="kapitola9.html">9</a>
<a href="kapitola10.html">10</a>

</div>

<div class="last-read" id="lastRead">
</div>

<script>

/* ZOBRAZIT POSLEDNÍ PŘEČTENOU */

var last = localStorage.getItem("lastChapter");

if (last) {

document.getElementById("lastRead").innerHTML =
"Poslední přečtená kapitola: " +
"<a href='" + last + "'>Pokračovat ve čtení</a>";

}

</script>

</body>
</html>
