<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kapitoly</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: #000;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
}

nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    margin-top: 20px;
    font-size: 32px;
}

.chapter-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;

    max-width: 900px;
    margin: 40px auto;
}

.chapter {
    display: flex;
    align-items: center;
    justify-content: center;

    width: 50px;
    height: 50px;

    border: 1px solid #666;
    color: white;

    font-family: 'MedievalSharp', cursive;
    font-size: 20px;

    text-decoration: none;

    position: relative;
}

.chapter.locked {
    border: 1px solid #444;
    color: #777;
    pointer-events: none;
}

.chapter.locked::after {
    content: "🔒";
    position: absolute;
    bottom: 4px;
    right: 4px;
    font-size: 12px;
}

.chapter:hover {
    border-color: #d4af37;
    color: #d4af37;
}

</style>

</head>

<body>

<nav>
    <a href="hlavni.html">Domů</a>
</nav>

<h1>Kapitoly</h1>

<div class="chapter-grid" id="chapterGrid">
</div>

<script>

const totalChapters = 36;
const grid = document.getElementById("chapterGrid");

for (let i = 1; i <= totalChapters; i++) {

    const link = document.createElement("a");
    link.className = "chapter";
    link.textContent = i;
    link.href = "kapitola" + i + ".html";

    fetch(link.href)
        .then(response => response.text())
        .then(text => {

            if (text.trim().length < 200) {
                link.classList.add("locked");
                link.removeAttribute("href");
            }

        })
        .catch(() => {
            link.classList.add("locked");
            link.removeAttribute("href");
        });

    grid.appendChild(link);

}

</script>

</body>
</html>
