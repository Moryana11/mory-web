<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kapitoly</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: #000;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Navigace */
nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    color: #f1d27a;
}

/* Nadpis */
h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    margin-top: 20px;
    font-size: 32px;
}

/* Mřížka kapitol */
.chapter-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;

    max-width: 900px;
    margin: 40px auto;
}

/* Otevřená kapitola */
.chapter-grid a {
    display: flex;
    align-items: center;
    justify-content: center;

    width: 50px;
    height: 50px;

    border: 1px solid #666;
    color: white;

    text-decoration: none;

    font-family: 'MedievalSharp', cursive;
    font-size: 20px;

    transition: 0.2s;
}

.chapter-grid a:hover {
    border-color: #d4af37;
    color: #d4af37;
}

/* Zamčená kapitola */
.chapter-grid .locked {
    display: flex;
    align-items: center;
    justify-content: center;

    width: 50px;
    height: 50px;

    border: 1px solid #444;
    color: #777;

    font-family: 'MedievalSharp', cursive;
    font-size: 18px;

    position: relative;
}

/* Ikona zámku */
.chapter-grid .locked::after {
    content: "🔒";
    position: absolute;
    bottom: 4px;
    right: 4px;
    font-size: 12px;
}

</style>

</head>

<body>

<nav>
    <a href="hlavni.html">Domů</a>
</nav>

<div class="chapter-grid">
