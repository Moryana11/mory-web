<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Books</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* BODY */

body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
    position: relative;
}

/* MAGIC DUST */

#magicDust{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

/* LANGUAGE SWITCH */

.language-switch {
    position: fixed;
    top: 15px;
    right: 20px;
    z-index: 1000;

    display: flex;
    gap: 10px;
}

.language-switch a {
    text-decoration: none;
    font-size: 22px;
}

/* CONTENT ABOVE EFFECT */

.back-link,
h1,
.book-image,
.image-hint {
    position: relative;
    z-index: 2;
}

/* BACK LINK */

.back-link {
    margin-top: 25px;
}

.back-link a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 20px;
    transition: 0.3s;
}

.back-link a:hover {
    text-shadow:
        0 0 10px #d4af37,
        0 0 20px rgba(212,175,55,0.8);
}

/* TITLE */

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 46px;
    margin-top: 15px;
}

/* BOOK IMAGE */

.book-image {
    margin-top: 40px;
}

.book-image img {

    width: 100%;
    max-width: 340px;

    border-radius: 16px;

    border: 2px solid #d4af37;

    cursor: pointer;

    transition: 0.35s;

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 14px rgba(212,175,55,0.6);

}

.book-image img:hover {

    transform: scale(1.03);

    box-shadow:
        0 0 0 2px #d4af37,
        0 0 25px rgba(212,175,55,0.9);

}

/* TEXT UNDER IMAGE */

.image-hint {

    margin-top: 22px;

    font-family: 'MedievalSharp', cursive;

    color: #d4af37;

    font-size: 22px;

    opacity: 0.9;

}

/* MOBILE */

@media (max-width: 768px) {

    h1 {
        font-size: 36px;
    }

    .book-image img {
        max-width: 90%;
    }

    .image-hint {
        font-size: 18px;
        padding: 0 10px;
    }

}

</style>

</head>

<body>

<!-- MAGIC DUST -->

<canvas id="magicDust"></canvas>

<!-- LANGUAGE SWITCH -->

<div class="language-switch">

<a href="knihy.html">🇨🇿</a>

<a href="books.html">🇬🇧</a>

</div>

<!-- BACK LINK -->

<div class="back-link">
<a href="hlavni_en.html">← Back to main page</a>
</div>

<!-- TITLE -->

<h1>Books</h1>

<!-- BOOK IMAGE -->

<div class="book-image">

<a href="book1.html">

<img src="fireandwater.png" alt="Fire and Water">

</a>

<div class="image-hint">
Click on the book cover to enter the story.
</div>

</div>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas = document.getElementById("magicDust");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

class Particle {

    constructor(){
        this.reset();
    }

    reset(){

        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        this.size = Math.random() * 2 + 1;

        this.speedX = (Math.random() - 0.5) * 0.25;
        this.speedY = (Math.random() - 0.5) * 0.25;

        this.opacity = Math.random() * 0.5 + 0.2;

        this.glow = Math.random() * 18 + 8;
    }

    update(){

        this.x += this.speedX;
        this.y += this.speedY;

        if(
            this.x < -50 ||
            this.x > canvas.width + 50 ||
            this.y < -50 ||
            this.y > canvas.height + 50
        ){
            this.reset();
        }
    }

    draw(){

        const gradient = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            this.glow
        );

        gradient.addColorStop(
            0,
            `rgba(255,215,120,${this.opacity})`
        );

        gradient.addColorStop(
            1,
            "rgba(255,215,120,0)"
        );

        ctx.beginPath();

        ctx.fillStyle = gradient;

        ctx.arc(
            this.x,
            this.y,
            this.glow,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }

}

for(let i = 0; i < 80; i++){
    particles.push(new Particle());
}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(particle => {
        particle.update();
        particle.draw();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

</script>

</body>
</html>
