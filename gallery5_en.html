<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* LANGUAGE SWITCH */

.language-switch {
position: fixed;
top: 15px;
right: 20px;
font-size: 22px;
z-index: 1000;
}

.language-switch a {
text-decoration: none;
margin-left: 8px;
}

body {
background-color: black;
margin: 0;
text-align: center;
font-family: Arial, sans-serif;
}

nav {
margin-top: 20px;
}

nav a {
font-family: 'MedievalSharp', cursive;
color: #d4af37;
text-decoration: none;
font-size: 18px;
}

h1 {
font-family: 'MedievalSharp', cursive;
color: #d4af37;
font-size: 42px;
margin-top: 10px;
}

.gallery {
display: flex;
justify-content: center;
gap: 30px;
margin-top: 40px;
flex-wrap: wrap;
}

.gallery img {
width: 100%;
max-width: 300px;
cursor: pointer;

border-radius: 12px;
border: 2px solid #d4af37;

box-shadow:
0 0 0 2px #d4af37,
0 0 12px rgba(212,175,55,0.6);
}

.overlay {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-color: rgba(0,0,0,0.95);
justify-content: center;
align-items: center;
z-index: 999;
}

.overlay img {
max-width: 90%;
max-height: 90%;
}

.arrow {
position: absolute;
top: 50%;
transform: translateY(-50%);
font-size: 50px;
color: #d4af37;
cursor: pointer;
padding: 15px;
}

.arrow-left {
left: 20px;
}

.arrow-right {
right: 20px;
}

.pagination {
margin-top: 40px;
}

.pagination a {
font-family: 'MedievalSharp', cursive;
color: #d4af37;
text-decoration: none;
margin: 0 8px;
}

.pagination a.active {
color: white;
font-weight: bold;
}

@media (max-width: 768px) {

.gallery {
flex-direction: column;
align-items: center;
}

.gallery img {
max-width: 90%;
}

.arrow {
font-size: 40px;
}

}

</style>

</head>

<body>

<div class="language-switch">

<a href="galerie5.html">🇨🇿</a> <a href="gallery5_en.html">🇬🇧</a>

</div>

<nav>
<a href="hlavni_en.html">Home</a>
</nav>

<h1>Gallery</h1>

<div class="gallery">

<img src="13.png" onclick="openImage(0)">
<img src="14.png" onclick="openImage(1)">
<img src="15.png" onclick="openImage(2)">

</div>

<div class="overlay" id="overlay">

<div class="arrow arrow-left" onclick="prevImage()">←</div>

<img id="bigImage">

<div class="arrow arrow-right" onclick="nextImage()">→</div>

</div>

<div class="pagination">

<a href="gallery_en.html">1</a> <a href="gallery2_en.html">2</a> <a href="gallery3_en.html">3</a> <a href="gallery4_en.html">4</a> <a href="#" class="active">5</a> <a href="gallery6_en.html">6</a> <a href="gallery7_en.html">7</a> <a href="gallery8_en.html">8</a> <a href="gallery9_en.html">9</a>

</div>

<script>

var images = [
"13.png",
"14.png",
"15.png"
];

var currentIndex = 0;

var nextPage = "gallery6_en.html";
var prevPage = "gallery4_en.html";

function openImage(index) {

currentIndex = index;

document.getElementById("bigImage").src =
images[currentIndex];

document.getElementById("overlay").style.display =
"flex";

}

function nextImage() {

currentIndex++;

if (currentIndex >= images.length) {

window.location.href =
nextPage + "?img=0";

return;

}

document.getElementById("bigImage").src =
images[currentIndex];

}

function prevImage() {

currentIndex--;

if (currentIndex < 0) {

window.location.href =
prevPage + "?img=2";

return;

}

document.getElementById("bigImage").src =
images[currentIndex];

}

window.onload = function() {

var params =
new URLSearchParams(window.location.search);

var imgIndex =
params.get("img");

if (imgIndex !== null) {

openImage(parseInt(imgIndex));

}

};

document.getElementById("overlay")
.addEventListener("click", function(e) {

if (e.target.id === "overlay") {

document.getElementById("overlay").style.display =
"none";

}

});

document.addEventListener("keydown", function(e) {

if (e.key === "ArrowRight") nextImage();

if (e.key === "ArrowLeft") prevImage();

if (e.key === "Escape") {

document.getElementById("overlay").style.display =
"none";

}

});

</script>

</body>
</html>
