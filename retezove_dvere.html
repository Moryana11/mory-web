<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zamčené dveře</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* PŘEPÍNAČ */

.language-switch {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 22px;
}

.language-switch a {
    text-decoration: none;
    margin-left: 8px;
}

/* DVEŘE */

img {
    margin-top: 40px;
    width: 100%;
    max-width: 350px;
    border-radius: 12px;
    border: 2px solid #d4af37;
    box-shadow:
        0 0 0 2px #d4af37,
        0 0 12px rgba(212,175,55,0.6);

    cursor: pointer;
}

/* TEXT */

p {
    margin-top: 25px;
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 22px;
}

</style>

</head>

<body>

<div class="language-switch">

<a href="#" onclick="setLang('cz')">🇨🇿</a>
<a href="#" onclick="setLang('en')">🇬🇧</a>

</div>

<img id="dvere"
src="dvere_retez.png"
onclick="vratSe()">

<p id="text"></p>

<script>

var lang =
localStorage.getItem("lang") || "cz";

applyLanguage();

function setLang(l) {

localStorage.setItem("lang", l);

lang = l;

applyLanguage();

}

/* TEXT */

function applyLanguage() {

var text =
document.getElementById("text");

if (lang === "en") {

document.title =
"Locked Door";

text.innerHTML =
"The door remains locked.<br>Click the door and try again.";

} else {

document.title =
"Zamčené dveře";

text.innerHTML =
"Dveře zůstávají zamčené.<br>Klikni na dveře a zkus to znovu.";

}

}

/* NÁVRAT */

function vratSe() {

window.location.href =
"index.html";

}

</script>

<!-- OCHRANA -->

<script src="ochrana.js"></script>

</body>

</html>
