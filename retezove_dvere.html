<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Zamčené dveře</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: white;
    text-align: center;
}

/* Nadpis */
h2 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    margin-top: 30px;
    font-size: 32px;
}

/* Prostřední text */
p {
    font-size: 18px;
    margin-top: 10px;
}

/* Spodní věta ve stejném medieval stylu */
.retry {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 20px;
    margin-top: 20px;
}

/* Jednotný rámeček */
.frame {
    width: 320px;
    max-width: 90%;
    height: auto;

    border-radius: 12px;
    border: 1px solid #c9a646;

    padding: 12px;
    background-color: black;

    box-shadow:
        0 0 6px rgba(201, 166, 70, 0.4);

    display: block;
    margin: 40px auto;

    cursor: pointer;
}

</style>

</head>

<body>

<h2>Špatné heslo, příteli.</h2>

<p>Dveře zůstávají zamčené.</p>

<a href="index.html">
    <img src="retezove_dvere.png" alt="Zamčené dveře" class="frame">
</a>

<p class="retry">Zkus to znovu.</p>

</body>
</html>
