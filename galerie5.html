<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

/* BODY */

body {

background-color: black;

margin: 0;

text-align: center;

font-family: Arial, sans-serif;

overflow-x: hidden;

position: relative;

}

/* MAGIC DUST */

#magicDust{

position: fixed;

top: 0;

left: 0;

width: 100%;

height: 100%;

pointer-events: none;

z-index: 0;

}

/* CONTENT ABOVE EFFECT */

.language-switch,
nav,
h1,
.gallery,
.pagination,
.overlay {

position: relative;

z-index: 2;

}

/* LANGUAGE SWITCH */

.language-switch {

position: fixed;

top: 15px;

right: 15px;

z-index: 999999;

display: flex;

align-items: center;

gap: 18px;

}

.language-switch a {

font-family: 'MedievalSharp', cursive;

text-decoration: none;

color: #d4af37;

font-size: 24px;

line-height: 1;

display: block;

transition: 0.3s;

}

/* ACTIVE LANGUAGE */

.language-switch a.active-lang {

color: white;

text-shadow:
0 0 10px rgba(255,255,255,0.7);

}

/* HOVER */

.language-switch a:hover {

text-shadow:
0 0 10px #d4af37,
0 0 20px rgba(212,175,55,0.8);

}

/* NAV */

nav {

margin-top: 20px;

}

nav a {

font-family: 'MedievalSharp', cursive;

color: #d4af37;

text-decoration: none;

font-size: 20px;

transition: 0.3s;

}

nav a:hover {

text-shadow:
0 0 10px #d4af37,
0 0 20px rgba(212,175,55,0.8);

}

/* TITLE */

h1 {

font-family: 'MedievalSharp', cursive;

color: #d4af37;

font-size: 42px;

margin-top: 10px;

text-shadow:
0 0 12px rgba(212,175,55,0.35);

}

/* GALLERY */

.gallery {

display: flex;

justify-content: center;

gap: 30px;

margin-top: 40px;

flex-wrap: wrap;

}

.gallery img {

width: 100%;

max-width: 240px;

aspect-ratio: 2 / 3;

object-fit: cover;

cursor: pointer;

border-radius: 12px;

border: 2px solid #d4af37;

transition: 0.35s;

box-shadow:
0 0 0 2px #d4af37,
0 0 12px rgba(212,175,55,0.6);

}

.gallery img:hover {

transform: scale(1.02);

box-shadow:
0 0 0 2px #d4af37,
0 0 24px rgba(212,175,55,0.9);

}

/* OVERLAY */

.overlay {

display: none;

position: fixed;

top: 0;

left: 0;

width: 100%;

height: 100%;

background-color: rgba(0,0,0,0.95);

justify-content: center;

align-items: center;

z-index: 9999;

}

.overlay img {

max-width: 90%;

max-height: 90%;

border-radius: 12px;

border: 2px solid #d4af37;

box-shadow:
0 0 30px rgba(212,175,55,0.6);

}

/* ARROWS */

.arrow {

position: absolute;

top: 50%;

transform: translateY(-50%);

font-size: 50px;

color: #d4af37;

cursor: pointer;

padding: 15px;

user-select: none;

transition: 0.3s;

}

.arrow:hover {

text-shadow:
0 0 10px #d4af37,
0 0 20px rgba(212,175,55,0.8);

}

.arrow-left {

left: 20px;

}

.arrow-right {

right: 20px;

}

/* PAGINATION */

.pagination {

margin-top: 40px;

margin-bottom: 50px;

}

.pagination a {

font-family: 'MedievalSharp', cursive;

color: #d4af37;

text-decoration: none;

margin: 0 8px;

font-size: 22px;

transition: 0.3s;

}

.pagination a:hover {

text-shadow:
0 0 10px #d4af37,
0 0 20px rgba(212,175,55,0.8);

}

.pagination a.active {

color: white;

font-weight: bold;

}

/* MOBILE */

@media (max-width: 768px) {

.gallery {

flex-direction: column;

align-items: center;

}

.gallery img {

max-width: 90%;

}

.arrow {

font-size: 40px;

}

h1 {

font-size: 36px;

}

.language-switch {

top: 12px;

right: 12px;

gap: 14px;

}

.language-switch a {

font-size: 20px;

}

}

</style>

</head>

<body>

<!-- MAGIC DUST -->

<canvas id="magicDust"></canvas>

<!-- LANGUAGE SWITCH -->

<div class="language-switch">

<a href="galerie5.html" class="active-lang">
CZ
</a>

<a href="gallery5_en.html">
EN
</a>

</div>

<!-- NAV -->

<nav>

<a href="kniha1.html">← Zpět na Oheň a voda</a>

</nav>

<!-- TITLE -->

<h1>Galerie</h1>

<!-- GALLERY -->

<div class="gallery">

<img src="13.webp"
     loading="lazy"
     onclick="openImage(0)">

<img src="14.webp"
     loading="lazy"
     onclick="openImage(1)">

<img src="15.webp"
     loading="lazy"
     onclick="openImage(2)">

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay">

<div
class="arrow arrow-left"
id="leftArrow"
onclick="prevImage()"
>

←

</div>

<img id="bigImage">

<div
class="arrow arrow-right"
id="rightArrow"
onclick="nextImage()"
>

→

</div>

</div>

<!-- PAGINATION -->

<div class="pagination">

<a href="galerie.html">1</a>

<a href="galerie2.html">2</a>

<a href="galerie3.html">3</a>

<a href="galerie4.html">4</a>

<a href="#" class="active">5</a>

<a href="galerie6.html">6</a>

<a href="galerie7.html">7</a>

<a href="galerie8.html">8</a>

<a href="galerie9.html">9</a>

</div>

<!-- GALLERY SCRIPT -->

<script>

var images = [
"13.png",
"14.png",
"15.png"
];

var currentIndex = 0;

var nextPage = "galerie6.html";
var prevPage = "galerie4.html";

/* ELEMENTS */

var overlay =
document.getElementById("overlay");

var bigImage =
document.getElementById("bigImage");

/* UPDATE ARROWS */

function updateArrows() {

var leftArrow =
document.getElementById("leftArrow");

var rightArrow =
document.getElementById("rightArrow");

/* LEFT */

if (
currentIndex === 0 &&
prevPage === null
) {

leftArrow.style.display =
"none";

} else {

leftArrow.style.display =
"block";

}

/* RIGHT */

if (
currentIndex === images.length - 1 &&
nextPage === null
) {

rightArrow.style.display =
"none";

} else {

rightArrow.style.display =
"block";

}

}

/* OPEN IMAGE */

function openImage(index) {

currentIndex = index;

bigImage.src =
images[currentIndex];

overlay.style.display =
"flex";

updateArrows();

}

/* NEXT */

function nextImage() {

currentIndex++;

if (currentIndex >= images.length) {

if (nextPage) {

window.location.href =
nextPage + "?img=0&overlay=open";

}

return;

}

bigImage.src =
images[currentIndex];

updateArrows();

}

/* PREVIOUS */

function prevImage() {

currentIndex--;

if (currentIndex < 0) {

if (prevPage) {

window.location.href =
prevPage + "?img=2&overlay=open";

}

return;

}

bigImage.src =
images[currentIndex];

updateArrows();

}

/* AUTO OPEN */

window.onload = function() {

var params =
new URLSearchParams(window.location.search);

var imgIndex =
params.get("img");

var overlayState =
params.get("overlay");

if (
imgIndex !== null &&
overlayState === "open"
) {

openImage(parseInt(imgIndex));

}

};

/* CLOSE OVERLAY */

overlay.addEventListener("click", function(e) {

if (e.target.id === "overlay") {

overlay.style.display =
"none";

}

});

/* KEYBOARD */

document.addEventListener("keydown", function(e) {

if (overlay.style.display !== "flex")
return;

if (e.key === "ArrowRight")
nextImage();

if (e.key === "ArrowLeft")
prevImage();

if (e.key === "Escape") {

overlay.style.display =
"none";

}

});

</script>

<!-- MAGIC DUST SCRIPT -->

<script>

const canvas =
document.getElementById("magicDust");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const particles = [];

class Particle {

constructor(){
this.reset();
}

reset(){

this.x =
Math.random() * canvas.width;

this.y =
Math.random() * canvas.height;

this.size =
Math.random() * 2 + 1;

this.speedX =
(Math.random() - 0.5) * 0.25;

this.speedY =
(Math.random() - 0.5) * 0.25;

this.opacity =
Math.random() * 0.5 + 0.2;

this.glow =
Math.random() * 18 + 8;

}

update(){

this.x += this.speedX;
this.y += this.speedY;

if(
this.x < -50 ||
this.x > canvas.width + 50 ||
this.y < -50 ||
this.y > canvas.height + 50
){

this.reset();

}

}

draw(){

const gradient =
ctx.createRadialGradient(
this.x,
this.y,
0,
this.x,
this.y,
this.glow
);

gradient.addColorStop(
0,
`rgba(255,215,120,${this.opacity})`
);

gradient.addColorStop(
1,
"rgba(255,215,120,0)"
);

ctx.beginPath();

ctx.fillStyle =
gradient;

ctx.arc(
this.x,
this.y,
this.glow,
0,
Math.PI * 2
);

ctx.fill();

}

}

for(let i = 0; i < 80; i++){

particles.push(new Particle());

}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(particle => {

particle.update();
particle.draw();

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize", () => {

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

});

</script>

<!-- PROTECTION -->

<script src="ochrana.js"></script>

</body>
</html>
