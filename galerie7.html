<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Galerie</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: black;
    text-align: center;
    font-family: Arial, sans-serif;
}

nav {
    margin-top: 20px;
}

nav a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    font-size: 18px;
}

h1 {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    font-size: 36px;
}

.gallery {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.gallery img {
    width: 250px;
    border-radius: 10px;
    border: 2px solid #d4af37;
    box-shadow: 0 0 8px rgba(212,175,55,0.6);
    cursor: pointer;
}

#lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border: 2px solid #d4af37;
}

.pagination {
    margin: 40px 0;
}

.pagination a {
    font-family: 'MedievalSharp', cursive;
    color: #d4af37;
    text-decoration: none;
    margin: 0 8px;
}

.pagination a.active {
    color: white;
    font-weight: bold;
}
</style>

</head>

<body>

<nav>
<a href="hlavni.html">Domů</a>
</nav>

<h1>Galerie</h1>

<div class="gallery">

<img src="obrazek19.png" onclick="openLightbox(this)">
<img src="obrazek20.png" onclick="openLightbox(this)">
<img src="obrazek21.png" onclick="openLightbox(this)">

</div>

<div class="pagination">
<a href="galerie.html">1</a>
<a href="galerie2.html">2</a>
<a href="galerie3.html">3</a>
<a href="galerie4.html">4</a>
<a href="galerie5.html">5</a>
<a href="galerie6.html">6</a>
<a href="#" class="active">7</a>
<a href="galerie8.html">8</a>
<a href="galerie9.html">9</a>
</div>

<div id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>
function openLightbox(img) {
document.getElementById("lightbox").style.display = "flex";
document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
